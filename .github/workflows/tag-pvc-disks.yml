name: Tag PVC Disks

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}

jobs:
  tag-pvc-disks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure CLI login
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          creds: '{"clientId":"${{ env.ARM_CLIENT_ID }}","clientSecret":"${{ env.ARM_CLIENT_SECRET }}","subscriptionId":"${{ env.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ env.ARM_TENANT_ID }}"}'

      - name: Tag PVC disks
        run: |
          ./tag-pvc-disks.sh equalvote equalvote tagged-disks.tfvars
        working-directory: terraform

      - name: Create PR with updated tagged-disks.tfvars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          branch="tag-pvc-disks-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$branch"
          git add tagged-disks.tfvars
          git commit -m "chore: update tagged-disks.tfvars"
          git push origin "$branch"
          gh pr create \
            --title "chore: update tagged-disks.tfvars" \
            --body "Automated update of tagged-disks.tfvars from tag-pvc-disks workflow." \
            --base main
        working-directory: terraform
